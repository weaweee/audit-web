</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#fff;--gray-50:#f9f9f8;--gray-100:#f2f2f0;--gray-200:#e5e5e2;
  --gray-300:#d0d0cc;--gray-400:#a0a09a;--gray-500:#737370;--gray-600:#525250;
  --gray-700:#3a3a38;--gray-800:#262624;--gray-900:#1a1a18;--accent:#2d2d2b;
  --c-sl:#9ca3af;--c-minor:#3b82f6;--c-medium:#f97316;--c-mayor:#ef4444;
  --radius:8px;--radius-lg:12px;--sidebar-w:220px;
  --c-teal:#0e7490;
}
/* ── Dark Mode Variables ── */
body.dark{
  --white:#1e1e2e;
  --gray-50:#16213e;
  --gray-100:#1a1a2e;
  --gray-200:#2a2a45;
  --gray-300:#3a3a5c;
  --gray-400:#6b6b8a;
  --gray-500:#9494b0;
  --gray-600:#b0b0cc;
  --gray-700:#d0d0e8;
  --gray-800:#e8e8f5;
  --gray-900:#f0f0ff;
  --accent:#7c3aed;
  --c-teal:#06b6d4;
  background:#1a1a2e;
  color:#e8e8f5;
}
body.dark .chart-card,
body.dark .metric-card,
body.dark .kpi-card,
body.dark .table-card,
body.dark .filter-card,
body.dark .login-box{
  background:#1e1e2e;
  border-color:#2a2a45;
}
body.dark table thead tr{background:#16213e}
body.dark table tbody tr:hover{background:#16213e}
body.dark table tbody tr:nth-child(even){background:#1a1a2e}
body.dark .btn-group button,
body.dark .icon-btn{background:#2a2a45;color:#d0d0e8;border-color:#3a3a5c}
body.dark .icon-btn:hover{background:#3a3a5c}
body.dark select,body.dark input[type=text],body.dark input[type=date],body.dark input[type=password]{
  background:#1e1e2e;color:#e8e8f5;border-color:#3a3a5c;
}
body.dark select option{background:#1e1e2e}
body.dark .page-header{border-color:#2a2a45}
body.dark .nav-item:hover{background:#16213e}
body.dark .nav-item.active{background:#2a2a45;border-left-color:#7c3aed}
body.dark .sub-item:hover{background:#16213e}
body.dark .chart-card-header{border-color:#2a2a45}
body.dark .metric-card.mc-sl{border-top-color:#6b7280}
body.dark .tag-badge{background:#2a2a45}
body.dark #login-screen{background:linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 40%,#16213e 100%)}
body.dark .login-box{box-shadow:0 8px 40px rgba(124,58,237,.15)}
body.dark .login-logo{background:#7c3aed}
body.dark .pres-improvement{background:#1e1e2e;border-color:#2a2a45}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--gray-100);color:var(--gray-800);font-size:14px}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--gray-100);display:flex;align-items:center;justify-content:center;z-index:1000;background-image:radial-gradient(ellipse at 20% 50%,rgba(45,45,43,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(14,116,144,.06) 0%,transparent 60%)}
.login-box{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:40px 36px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.login-logo{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.login-logo svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}
.login-box h1{font-size:19px;font-weight:600;color:var(--gray-900);margin-bottom:4px}
.login-box p{font-size:13px;color:var(--gray-500);margin-bottom:24px}
.login-box label{display:block;font-size:12px;font-weight:500;color:var(--gray-600);margin-bottom:6px}
.login-box input{width:100%;padding:10px 12px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s;letter-spacing:.08em}
.login-box input:focus{border-color:var(--gray-600)}
.login-btn{width:100%;margin-top:14px;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-error{display:none;margin-top:10px;padding:10px 12px;background:#fff0f0;border:1px solid #fcc;border-radius:var(--radius);font-size:13px;color:#c53030}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--white);border-radius:var(--radius-lg);padding:28px;width:460px;max-width:96vw;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-box h3{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--gray-900)}
.modal-box p{font-size:13px;color:var(--gray-500);margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;font-weight:500;color:var(--gray-600);margin-bottom:5px}
.modal-field select,.modal-field input{width:100%;padding:8px 10px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:var(--gray-50)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-btn-cancel{padding:8px 16px;background:transparent;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--gray-600)}
.modal-btn-ok{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.modal-preview{max-height:180px;overflow-y:auto;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px;font-size:12px;font-family:'DM Mono',monospace;color:var(--gray-700);margin-top:10px;white-space:pre-wrap}

/* APP */
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--gray-200)}
.sidebar-header .brand{font-size:14px;font-weight:600;color:var(--gray-900)}
.sidebar-header .user-badge{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:3px 8px;background:var(--gray-100);border-radius:4px;font-size:11px;font-weight:500;color:var(--gray-600);font-family:'DM Mono',monospace}
.nav-section{padding:10px 0}
.nav-label{padding:4px 18px 5px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400)}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;font-size:13px;color:var(--gray-600);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:var(--gray-50);color:var(--gray-800)}
.nav-item.active{background:var(--gray-100);color:var(--gray-900);border-left-color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.nav-arrow{margin-left:auto;transition:transform .2s;font-size:10px;color:var(--gray-400)}
.nav-arrow.open{transform:rotate(180deg)}
.sub-nav{overflow:hidden;max-height:0;transition:max-height .2s}
.sub-nav.open{max-height:120px}
.sub-item{padding:6px 18px 6px 44px;font-size:13px;color:var(--gray-500);cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.sub-item:hover{background:var(--gray-50);color:var(--gray-800)}
.sub-item.active{color:var(--gray-900);font-weight:500;border-left-color:var(--gray-400)}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--gray-200)}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-500);cursor:pointer;padding:5px 0;transition:color .12s}
.logout-btn:hover{color:var(--c-mayor)}
.logout-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--gray-50)}
.page-header{padding:22px 26px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-header h2{font-size:17px;font-weight:600;color:var(--gray-900)}
.page-header p{font-size:12px;color:var(--gray-500);margin-top:3px}
.content{padding:18px 26px 28px}

/* METRIC CARDS */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:18px}
.metric-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:14px}
.metric-card .mc-label{font-size:10px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.metric-card .mc-value{font-size:22px;font-weight:600;color:var(--gray-900);letter-spacing:-.4px;line-height:1}
.metric-card .mc-sub{font-size:11px;color:var(--gray-400);margin-top:4px}
.metric-card .mc-trend{font-size:11px;margin-top:4px;font-weight:500}
.mc-sl{border-top:3px solid var(--c-sl)}.mc-minor{border-top:3px solid var(--c-minor)}
.mc-medium{border-top:3px solid var(--c-medium)}.mc-mayor{border-top:3px solid var(--c-mayor)}
.trend-up{color:#ef4444}.trend-down{color:#22c55e}.trend-neutral{color:var(--gray-400)}

/* CHART CARD */
.chart-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.chart-card-header h3{font-size:13px;font-weight:600;color:var(--gray-800)}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray-500)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart-wrap{position:relative;width:100%}

/* TABLE */
.table-wrap{overflow-x:auto;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--gray-200)}
th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--gray-100);color:var(--gray-700)}
tr:hover td{background:var(--gray-50)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.badge-sl{background:#f1f2f4;color:#6b7280}
.badge-minor{background:#eff6ff;color:#1d4ed8}
.badge-medium{background:#fff7ed;color:#c2410c}
.badge-mayor{background:#fef2f2;color:#b91c1c}
.badge-green{background:#f0fdf4;color:#15803d}
.badge-yellow{background:#fffbeb;color:#b45309}
.badge-red{background:#fef2f2;color:#b91c1c}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg)}
.toolbar label{font-size:12px;font-weight:500;color:var(--gray-600)}
.toolbar input[type=date],.toolbar select,.sel{padding:6px 10px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--gray-700);outline:none;background:var(--gray-50)}
.filter-btn{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.filter-btn:hover{opacity:.85}
.reset-btn{padding:7px 12px;background:transparent;color:var(--gray-600);border:1px solid var(--gray-200);border-radius:var(--radius);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.reset-btn:hover{background:var(--gray-100)}
.icon-btn{padding:6px 12px;background:transparent;color:var(--gray-700);border:1px solid var(--gray-300);border-radius:var(--radius);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.icon-btn:hover{background:var(--gray-100)}
.icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.ml-auto{margin-left:auto}
.btn-group{display:flex;gap:6px;margin-left:auto}

/* TABS */
.tab-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 14px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:12px;cursor:pointer;color:var(--gray-600);background:var(--white);font-family:'DM Sans',sans-serif;transition:all .12s}
.tab:hover{background:var(--gray-100)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* DROPDOWN */
.dropdown-wrap{position:relative;display:inline-block}
.dropdown-select{padding:6px 28px 6px 10px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--gray-700);background:var(--white);appearance:none;cursor:pointer;outline:none}
.dropdown-wrap::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--gray-400);pointer-events:none}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--gray-800);color:#fff;padding:11px 16px;border-radius:var(--radius);font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:340px}
#toast.show{opacity:1;transform:translateY(0)}
#file-import{display:none}

/* ── PRESENTATION MODE ── */
/* ── Presentation Dark Mode ── */
#pres-overlay{display:none;position:fixed;inset:0;background:#0f172a;z-index:5000;flex-direction:column;overflow:hidden}
#pres-overlay.active{display:flex}
.pres-header{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid #1e293b;background:#0f172a;flex-shrink:0}
.pres-brand{font-size:12px;font-weight:700;color:#475569;letter-spacing:.08em;text-transform:uppercase}
.pres-period{font-size:12px;color:#334155;margin-left:16px}
.pres-nav{display:flex;align-items:center;gap:10px}
.pres-nav-btn{width:38px;height:38px;border:1.5px solid #1e293b;border-radius:50%;background:#1e293b;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pres-nav-btn:hover:not(:disabled){background:#334155;border-color:#475569}
.pres-nav-btn:disabled{opacity:.25;cursor:not-allowed}
.pres-nav-btn svg{width:15px;height:15px;stroke:#94a3b8;fill:none;stroke-width:2}
.pres-counter{font-size:12px;color:#475569;min-width:55px;text-align:center;font-variant-numeric:tabular-nums}
.pres-close{padding:7px 16px;background:#334155;color:#e2e8f0;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.02em;transition:background .15s}
.pres-close:hover{background:#475569}
.pres-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.pres-progress{display:flex;gap:4px;padding:10px 40px 0;flex-shrink:0}
.pres-progress-dot{height:3px;border-radius:2px;background:#1e293b;flex:1;transition:background .25s}
.pres-progress-dot.done{background:#38bdf8}
.pres-slides{flex:1;overflow:hidden;position:relative}
.pres-slide{display:none;position:absolute;inset:0;padding:28px 60px 20px;overflow-y:auto;flex-direction:column}
.pres-slide.active{display:flex}
.pres-slide-header{margin-bottom:20px;flex-shrink:0}
.pres-slide-title{font-size:26px;font-weight:700;color:#f1f5f9;letter-spacing:-.4px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.pres-type-dot{width:16px;height:16px;border-radius:4px;flex-shrink:0}
.pres-slide-sub{font-size:13px;color:#475569}
.pres-chart-box{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:20px 24px;margin-bottom:18px;flex-shrink:0}
.pres-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.pres-legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#94a3b8}
.pres-legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.pres-chart-inner{position:relative;height:280px}
.pres-info-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex-shrink:0}
.pres-highlights{background:#0c4a6e;border:1px solid #075985;border-radius:12px;padding:18px 22px;color:#e0f2fe}
.pres-hl-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;opacity:.9;display:flex;align-items:center;gap:7px;color:#7dd3fc}
.pres-hl-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.pres-hl-list li{display:flex;gap:8px;font-size:13px;line-height:1.55;color:#bae6fd}
.pres-hl-list li span:first-child{opacity:.6;flex-shrink:0}
.pres-improvement{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px 22px}
.pres-imp-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;color:#fbbf24;display:flex;align-items:center;gap:7px}
.pres-imp-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.pres-imp-list li{display:flex;gap:8px;font-size:13px;line-height:1.55;color:#fde68a}
.pres-imp-list li span:first-child{color:#fbbf24;font-weight:700;flex-shrink:0;min-width:18px}
</style>
</head>

const BULAN_ORDER=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const BULAN_NUM={'Januari':1,'Februari':2,'Maret':3,'April':4,'Mei':5,'Juni':6,'Juli':7,'Agustus':8,'September':9,'Oktober':10,'November':11,'Desember':12};

function serialToDate(s){
  if(!s||isNaN(s))return null;
  return new Date(Math.round((parseFloat(s)-25569)*86400*1000));
}
function serialToStr(s){
  const d=serialToDate(s);
  if(!d)return '-';
  return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
}
function serialToBulanTahun(s){
  const d=serialToDate(s);
  if(!d)return null;
  return {bulan:BULAN_ORDER[d.getMonth()],tahun:d.getFullYear(),month:d.getMonth()+1};
}
function dateToSerial(dateStr){
  // Pakai UTC agar konsisten dengan serialToDate (base: 1899-12-30 UTC)
  const parts=dateStr.split('-');
  const d=Date.UTC(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const base=Date.UTC(1899,11,30);
  return Math.round((d-base)/86400000);
}

// ===== HELPERS =====
function errType(e){const t=String(e||'').toLowerCase().trim();return(t==='low'||t==='super low')?'sl':t==='minor'?'minor':t==='medium'?'medium':(t==='mayor'||t==='major')?'mayor':null;}
function errLabel(e){const t=errType(e);return t==='sl'?'Super Low':t==='minor'?'Minor':t==='medium'?'Medium':t==='mayor'?'Mayor':e;}
function errBadge(e){const t=errType(e);return t==='sl'?'badge-sl':t==='minor'?'badge-minor':t==='medium'?'badge-medium':t==='mayor'?'badge-mayor':'badge-sl';}
function kpiBadge(s){return s>=85?'badge-green':s>=75?'badge-yellow':'badge-red';}
function pct(v,t){return t>0?Math.round(v/t*100):0;}
function trenIcon(d){return d>0?`<span class="trend-up">▲ ${Math.abs(d)}% vs bln lalu</span>`:d<0?`<span class="trend-down">▼ ${Math.abs(d)}% vs bln lalu</span>`:`<span class="trend-neutral">— sama</span>`;}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ===== GSHEET SYNC =====
let syncStatus = 'idle'; // idle | loading | done | error | offline

async function syncFromGSheet() {
  if (!APPS_SCRIPT_URL || !APPS_SCRIPT_TOKEN) {
    syncStatus = 'offline';
    return false;
  }
  syncStatus = 'loading';
  updateSyncBadge();
  try {
    const url = `${APPS_SCRIPT_URL}?token=${encodeURIComponent(APPS_SCRIPT_TOKEN)}&action=all&t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    // Merge audit log — deduplicate by chatId + bulan + tahun
    if (Array.isArray(json.auditLog) && json.auditLog.length > 0) {
      // Buat composite key: chatId|bulan|tahun agar record bulan beda tidak diskip
      const existingKeys = new Set(DB.auditLog.map(r => {
        const d = serialToDate(r.s);
        const bulan = d ? BULAN_ORDER[d.getMonth()] : '';
        const tahun = d ? d.getFullYear() : '';
        return `${r.chatId}|${bulan}|${tahun}`;
      }));
      let added = 0;
      json.auditLog.forEach(r => {
        if (!r.chatId) return;
        const d = serialToDate(r.s);
        const bulan = d ? BULAN_ORDER[d.getMonth()] : '';
        const tahun = d ? d.getFullYear() : '';
        const key = `${r.chatId}|${bulan}|${tahun}`;
        if (existingKeys.has(key)) return;
        DB.auditLog.push(r);
        existingKeys.add(key);
        added++;
      });
    }

    // Replace KPI weekly & monthly — GSheet is source of truth
    // Merge: GSheet data override local data, local data preserved jika key belum ada di GSheet
    if (json.kpiWeekly && Object.keys(json.kpiWeekly).length > 0) {
      Object.entries(json.kpiWeekly).forEach(([k,v]) => { DB.kpiWeekly[k] = v; });
    }
    if (json.kpiMonthly && Object.keys(json.kpiMonthly).length > 0) {
      Object.entries(json.kpiMonthly).forEach(([k,v]) => { DB.kpiMonthly[k] = v; });
    }

    syncStatus = 'done';
    updateSyncBadge();
    return true;
  } catch (err) {
    syncStatus = 'error';
    updateSyncBadge();
    console.warn('GSheet sync failed:', err.message);
    return false;
  }
}

function updateSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  const map = {
    idle:    { text:'—',          color:'var(--gray-400)' },
    loading: { text:'⟳ Syncing…', color:'var(--gray-500)' },
    done:    { text:'✓ Synced',   color:'#22c55e' },
    error:   { text:'⚠ Offline',  color:'#f97316' },
    offline: { text:'Local data', color:'var(--gray-400)' }
  };
  const s = map[syncStatus] || map.idle;
  el.textContent = s.text;
  el.style.color = s.color;
}

// ===== GET UNIQUE YEARS =====
function allYears(){
  const ys=new Set();
  DB.auditLog.forEach(r=>{const d=serialToDate(r.s);if(d)ys.add(d.getFullYear());});
  Object.values(DB.kpiWeekly).forEach(v=>{if(v.tahun)ys.add(v.tahun);});
  Object.values(DB.kpiMonthly).forEach(v=>{if(v.tahun)ys.add(v.tahun);});
  return [...ys].sort();
}
function allBulansForYear(yr){
  const bs=new Set();
  DB.auditLog.forEach(r=>{const d=serialToDate(r.s);if(d&&d.getFullYear()===yr)bs.add(BULAN_ORDER[d.getMonth()]);});
  return BULAN_ORDER.filter(b=>bs.has(b));
}
function logForYear(yr){return DB.auditLog.filter(r=>{const d=serialToDate(r.s);return d&&d.getFullYear()===yr;});}
function logForBulanYear(b,yr){return DB.auditLog.filter(r=>{const d=serialToDate(r.s);return d&&d.getFullYear()===yr&&BULAN_ORDER[d.getMonth()]===b;});}
function summaryOf(rows){const s={sl:0,minor:0,medium:0,mayor:0};rows.forEach(r=>{const t=errType(r.err);if(t)s[t]++;});return s;}

  const userDef=USERS[val];
  if(userDef.password){
    const pwField=document.getElementById('password-field');
    const pwInput=document.getElementById('password-input');
    if(pwField.style.display==='none'){
      // Tampilkan field password dulu
      pwField.style.display='block';
      pwInput.focus();
      return;
    }
    // Validasi password
    if(pwInput.value!==userDef.password){
      errEl.style.display='block';
      pwInput.style.borderColor='#fca5a5';
      pwInput.value='';
      return;
    }
  }
  // FULL RESET state before login
  currentUser=null;currentPage='overview';destroyCharts();importContext=null;pendingImportData=null;
  currentUser={username:val,...USERS[val]};
  document.getElementById('login-error').style.display='none';
  document.getElementById('username-input').style.borderColor='';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-badge').innerHTML=`<span style="color:var(--gray-600);font-size:11px;font-weight:600">${currentUser.label}</span>`;
  rebuildNav();
  // Sync dari GSheet dulu, lalu navigate
  syncFromGSheet().then(() => navigate('overview'));
}
document.getElementById('username-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('password-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){
  // Full state reset
  currentUser=null;currentPage='overview';destroyCharts();importContext=null;pendingImportData=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('username-input').value='';
  document.getElementById('login-error').style.display='none';
  document.getElementById('username-input').style.borderColor='';
  document.getElementById('password-input').value='';
  document.getElementById('password-input').style.borderColor='';
  document.getElementById('password-field').style.display='none';
  document.getElementById('main-content').innerHTML='';
  // Reset sidebar nav — show all items so rebuildNav can re-apply
  ['nav-report','report-sub'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  document.querySelectorAll('.nav-item,.sub-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.sub-nav').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.nav-arrow').forEach(el=>el.classList.remove('open'));
}

function rebuildNav(){
  // Reset all first
  ['nav-report','report-sub'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  document.querySelectorAll('.nav-item,.sub-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.sub-nav').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.nav-arrow').forEach(el=>el.classList.remove('open'));
  // Hide report if no access
  if(currentUser.pages!=='all'&&!currentUser.pages.includes('report-weekly')){
    const nr=document.getElementById('nav-report'),rs=document.getElementById('report-sub');
    if(nr)nr.style.display='none';if(rs)rs.style.display='none';
  }
  if(currentUser.pages!=='all'&&!currentUser.pages.includes('tools')){
    const nt=document.getElementById('nav-tools');
    if(nt)nt.style.display='none';
  }
}

function canAccess(p){if(!currentUser)return false;if(currentUser.pages==='all')return true;return currentUser.pages.includes(p);}

// ===== NAV =====
function navigate(page,opts={}){
  if(!canAccess(page)){showToast('Anda tidak memiliki akses ke halaman ini.');return;}
  currentPage=page;destroyCharts();
  document.querySelectorAll('.nav-item,.sub-item').forEach(el=>el.classList.remove('active'));
  const act=id=>{const el=document.getElementById(id);if(el)el.classList.add('active');};
  if(page==='overview')act('nav-overview');
  else if(page==='kpi-weekly'){act('nav-kpi');act('sub-kpi-weekly');const s=document.getElementById('kpi-sub');if(s){s.classList.add('open');document.getElementById('kpi-arrow').classList.add('open');}}
  else if(page==='kpi-monthly'){act('nav-kpi');act('sub-kpi-monthly');const s=document.getElementById('kpi-sub');if(s){s.classList.add('open');document.getElementById('kpi-arrow').classList.add('open');}}
  else if(page==='report-weekly'){act('nav-report');act('sub-report-weekly');const s=document.getElementById('report-sub');if(s){s.classList.add('open');document.getElementById('report-arrow').classList.add('open');}}
  else if(page==='report-monthly'){act('nav-report');act('sub-report-monthly');const s=document.getElementById('report-sub');if(s){s.classList.add('open');document.getElementById('report-arrow').classList.add('open');}}
  else if(page==='audit')act('nav-audit');
  else if(page==='tools')act('nav-tools');
  const renders={overview:renderOverview,'kpi-weekly':renderKpiWeekly,'kpi-monthly':renderKpiMonthly,'report-weekly':renderReportWeekly,'report-monthly':renderReportMonthly,audit:renderAudit,tools:renderTools};
  if(renders[page])renders[page](opts);
}
function toggleSub(s,a){document.getElementById(s).classList.toggle('open');document.getElementById(a).classList.toggle('open');}

// Chart click → audit page
function attachChartClick(canvasId,labelsArr){
  setTimeout(()=>{
    const canvas=document.getElementById(canvasId);if(!canvas)return;
    canvas.style.cursor='pointer';
    canvas.onclick=(evt)=>{
      const ch=Chart.getChart(canvas);if(!ch)return;
      const pts=ch.getElementsAtEventForMode(evt,'nearest',{intersect:true},false);
      if(!pts.length)return;
      const label=labelsArr[pts[0].index];
      if(label&&BULAN_ORDER.includes(label))navigate('audit',{bulan:label});
    };
  },100);
}

function renderAudit(opts={}){

    // Selalu tampilkan semua 12 bulan — kosong pun tetap ada tabnya
    const bulans=BULAN_ORDER;

    if(!activeBulan){
      const withData=allBulansForYear(activeYear);
      activeBulan=withData.length>0?withData[withData.length-1]:BULAN_ORDER[new Date().getMonth()];
    }
    let rows=logForBulanYear(activeBulan,activeYear).filter(r=>errType(r.err));

// ===== KPI WEEKLY =====
function renderKpiWeekly(){
  const canImport=currentUser&&currentUser.canImport;
  // Get all years and months from kpiWeekly
  // Helper: ekstrak tahun/bulan dari key jika field kosong
  function kwGetTahun(v,k){return v.tahun||(k.match(/(\d{4})/)?parseInt(k.match(/(\d{4})/)[1]):2026);}
  function kwGetBulan(v,k){
    if(v.bulan)return v.bulan;
    const found=BULAN_ORDER.find(b=>k.includes(b));
    return found||'';
  }
  function kwYears(){return[...new Set(Object.entries(DB.kpiWeekly).map(([k,v])=>kwGetTahun(v,k)))].sort();}
  function kwBulansForYear(yr){
    return [...new Set(
      Object.entries(DB.kpiWeekly)
        .filter(([k,v])=>kwGetTahun(v,k)===yr)
        .map(([k,v])=>kwGetBulan(v,k))
    )].filter(Boolean)
     .sort((a,b)=>BULAN_ORDER.indexOf(a)-BULAN_ORDER.indexOf(b));
  }
  function kwWeeksForBulanYear(b,yr){
    return Object.entries(DB.kpiWeekly)
      .filter(([k,v])=>kwGetTahun(v,k)===yr && kwGetBulan(v,k)===b)
      .sort((a,b)=>(a[1].week||0)-(b[1].week||0));
  }

  const years=kwYears();
  let activeYear=years[years.length-1]||2026;
  let activeBulan=(kwBulansForYear(activeYear)[0])||'';
  let activeWeekKey='';

  function buildPage(){
    const bulans=kwBulansForYear(activeYear);
    if(!bulans.includes(activeBulan))activeBulan=bulans[0]||'';
    const weeks=kwWeeksForBulanYear(activeBulan,activeYear);
    if(!weeks.find(([k])=>k===activeWeekKey))activeWeekKey=weeks[0]?weeks[0][0]:'';

// ===== REPORT WEEKLY =====
function renderReportWeekly(){
  const years=allYears();
  let activeYear=years[years.length-1]||2026;
  let activeBulan=allBulansForYear(activeYear).slice(-1)[0]||'all';
  let selectedWeeks=[];
  const WEEK_RANGES=[{w:1,d1:1,d2:7},{w:2,d1:8,d2:14},{w:3,d1:15,d2:21},{w:4,d1:22,d2:28},{w:5,d1:29,d2:31}];
  const WR_LABEL={1:'1-7',2:'8-14',3:'15-21',4:'22-28',5:'29-31'};

  // ── Key Highlights generator ──────────────────────────────────
  // ── Key Highlights: Daily ─────────────────────────────────────
  // Membahas grafik daily — hari dengan error terbanyak, tipe dominan per hari
  window.genHighlightsDaily=function(wArr,lastWkRows,byDate,dKeys){
    const rows=lastWkRows||wArr.flatMap(w=>w.rows);
    if(!rows.length) return['Tidak ada temuan error pada periode ini.'];
    const ts=summaryOf(rows);
    const tot=ts.sl+ts.minor+ts.medium+ts.mayor;
    const lines=[];
    const lastW=wArr[wArr.length-1];
    const periodeLabel=lastW?lastW.dateRange||lastW.label:wArr.map(w=>w.label).join(', ');

    // Kalimat pembuka berdasarkan kondisi
    const domE=Object.entries(ts).sort((a,b)=>b[1]-a[1])[0];
    const domLabel={sl:'Super Low',minor:'Minor',medium:'Medium',mayor:'Mayor'}[domE[0]];
    if(tot===0){
      lines.push(`Pada periode ${periodeLabel}, tidak ditemukan temuan error sama sekali.`);
      return lines;
    }
    lines.push(`Berdasarkan grafik Daily Finding Error periode ${periodeLabel}, ${ts.mayor===0&&ts.medium===0?'kondisi sangat stabil — ':''}terdapat ${tot} temuan error dengan tipe dominan ${domLabel} (${pct(domE[1],tot)}%).`);

    // Hari dengan error terbanyak
    if(dKeys&&dKeys.length>0){
      const dayTotals=dKeys.map(d=>({d,tot:(byDate[d].sl||0)+(byDate[d].minor||0)+(byDate[d].medium||0)+(byDate[d].mayor||0)}));
      const maxDay=dayTotals.reduce((a,b)=>a.tot>b.tot?a:b);
      if(maxDay.tot>0) lines.push(`Temuan terbanyak terjadi pada tanggal ${maxDay.d} dengan ${maxDay.tot} temuan.`);
      const daysWithErr=dayTotals.filter(d=>d.tot>0).length;
      if(daysWithErr===1) lines.push('Error hanya ditemukan di 1 hari pada periode ini — hari lainnya bersih.');
      else if(daysWithErr>1) lines.push(`Error tersebar di ${daysWithErr} hari kerja pada periode ini.`);
    }

    // Kondisi Mayor/Medium
    if(ts.mayor===0&&ts.medium===0){
      lines.push('Tidak ditemukan error kategori Medium maupun Mayor — performa tim terbilang baik.');
    } else {
      if(ts.mayor>0) lines.push(`Terdapat ${ts.mayor} temuan Mayor yang memerlukan tindak lanjut segera.`);
      if(ts.medium>0) lines.push(`Terdapat ${ts.medium} temuan Medium yang perlu diperhatikan.`);
    }
    return lines;
  };

  // ── Key Highlights: Weekly Comparison ────────────────────────
  // Membahas perbandingan antar week — tren naik/turun, week terbaik/terburuk
  window.genHighlightsWeekly=function(wArr){
    const allRows=wArr.flatMap(w=>w.rows);
    if(!allRows.length) return['Tidak ada temuan error pada periode yang dipilih.'];
    const lines=[];
    const totals=wArr.map(w=>({
      label:w.label,
      tot:w.sum.sl+w.sum.minor+w.sum.medium+w.sum.mayor,
      sum:w.sum
    }));
    const grandTot=totals.reduce((s,t)=>s+t.tot,0);
    const maxW=totals.reduce((a,b)=>a.tot>b.tot?a:b);
    const minW=totals.reduce((a,b)=>a.tot<b.tot?a:b);

    // Kalimat pembuka perbandingan
    lines.push(`Dari grafik Weekly Finding Error periode ${wArr.map(w=>w.label).join(', ')}, total ${grandTot} temuan error ditemukan.`);

    if(maxW.tot!==minW.tot){
      lines.push(`${maxW.label} memiliki temuan tertinggi (${maxW.tot} error) dan ${minW.label} paling sedikit (${minW.tot} error).`);
    } else {
      lines.push('Jumlah temuan error konsisten di semua week yang dipilih.');
    }

    // Tren naik/turun
    if(totals.length>=2){
      const first=totals[0].tot;
      const last=totals[totals.length-1].tot;
      if(last<first) lines.push(`Tren positif — error menurun dari ${first} di ${totals[0].label} menjadi ${last} di ${totals[totals.length-1].label}.`);
      else if(last>first) lines.push(`Tren perlu perhatian — error meningkat dari ${first} di ${totals[0].label} menjadi ${last} di ${totals[totals.length-1].label}.`);
    }

    // Mayor/Medium summary
    const totMayor=totals.reduce((s,t)=>s+t.sum.mayor,0);
    const totMedium=totals.reduce((s,t)=>s+t.sum.medium,0);
    if(totMayor===0&&totMedium===0){
      lines.push('Tidak ditemukan error Mayor maupun Medium di seluruh week — kondisi stabil.');
    } else {
      if(totMayor>0) lines.push(`Total ${totMayor} temuan Mayor ditemukan — perlu coaching segera.`);
      if(totMedium>0) lines.push(`Total ${totMedium} temuan Medium ditemukan — perlu review SOP.`);
    }
    return lines;
  };

  // ── Key Highlights: gabungan (untuk tampilan dashboard biasa) ──
  window.genHighlights=function genHighlights(wArr,lastWkRows){
    // Gunakan daily highlights sebagai default untuk dashboard
    const allRows=wArr.flatMap(w=>w.rows);
    if(!allRows.length) return['Tidak ada temuan error pada periode yang dipilih.'];
    const ts=summaryOf(allRows);
    const tot=ts.sl+ts.minor+ts.medium+ts.mayor;
    const lines=[];
    const domE=Object.entries(ts).sort((a,b)=>b[1]-a[1])[0];
    const domLabel={sl:'Super Low',minor:'Minor',medium:'Medium',mayor:'Mayor'}[domE[0]];
    const periodeStr=wArr.map(w=>w.label).join(', ');
    if(wArr.length===1){
      lines.push(`Berdasarkan grafik Daily Finding Error periode ${wArr[0].dateRange||wArr[0].label}, kondisi ${ts.mayor===0&&ts.medium===0?'sangat stabil — ':''}terdapat ${tot} temuan error dengan tipe dominan ${domLabel} (${pct(domE[1],tot)}%).`);
    } else {
      const totals=wArr.map(w=>({l:w.label,t:w.sum.sl+w.sum.minor+w.sum.medium+w.sum.mayor}));
      const maxW=totals.reduce((a,b)=>a.t>b.t?a:b);
      const minW=totals.reduce((a,b)=>a.t<b.t?a:b);
      lines.push(`Dari grafik Weekly Finding Error periode ${periodeStr}, total ${tot} temuan error ditemukan. ${maxW.t!==minW.t?maxW.l+' memiliki temuan tertinggi ('+maxW.t+') dan '+minW.l+' paling sedikit ('+minW.t+').':''}`);
    }
    if(ts.mayor===0&&ts.medium===0){
      lines.push('Tidak ditemukan error kategori Medium maupun Mayor — performa tim terbilang baik pada periode ini.');
    } else {
      if(ts.mayor>0) lines.push(`Terdapat ${ts.mayor} temuan Mayor yang memerlukan tindak lanjut segera.`);
      if(ts.medium>0) lines.push(`Terdapat ${ts.medium} temuan Medium yang perlu diperhatikan.`);
    }
    return lines.slice(0,3); // maksimal 3 — singkat, padat, jelas
  };

  // ── Improvement generator ─────────────────────────────────────
  window.genImprovement=function genImprovement(wArr){
    const allRows=wArr.flatMap(w=>w.rows);
    if(!allRows.length) return['Tidak ada temuan error yang perlu ditindaklanjuti.'];
    const ts={sl:0,minor:0,medium:0,mayor:0};
    wArr.forEach(w=>{ts.sl+=w.sum.sl;ts.minor+=w.sum.minor;ts.medium+=w.sum.medium;ts.mayor+=w.sum.mayor;});
    const deskCnt={};allRows.forEach(r=>{deskCnt[r.desk]=(deskCnt[r.desk]||0)+1;});
    const topDesks=Object.entries(deskCnt).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const imp=[];
    if(ts.mayor>0) imp.push('Lakukan coaching intensif untuk agent yang memiliki temuan Mayor — fokus pada SOP meninggalkan chat dan penanganan informasi konfidensial.');
    if(ts.medium>0) imp.push('Review kembali prosedur KYC dan prosedur pemberian solusi kepada member — temuan Medium mengindikasikan ada gap pemahaman SOP.');
    const tagging=allRows.filter(r=>r.desk.toLowerCase().includes('tagging')).length;
    if(tagging>=2) imp.push(`Perlu refreshment materi tagging — ditemukan ${tagging} temuan terkait kesalahan tagging pada periode ini.`);
    else if(ts.minor>0) imp.push('Tingkatkan ketelitian dalam membalas chat member — temuan Minor dapat diminimalisir dengan double-check sebelum mengirim respon.');
    if(topDesks[0]&&topDesks[0][1]>=2) imp.push(`Fokuskan sesi coaching pada topik: "${topDesks[0][0]}" (${topDesks[0][1]}x ditemukan) sebagai prioritas utama perbaikan.`);
    if(!imp.length) imp.push('Pertahankan performa yang sudah baik dan lakukan monitoring berkala untuk menjaga konsistensi.');
    return imp;
  }

  // ── Render ────────────────────────────────────────────────────
  function renderRW(){
    const f=document.getElementById('rw-date-from').value;
    const t=document.getElementById('rw-date-to').value;
    if(!f||!t){showToast('Isi tanggal dari dan sampai terlebih dahulu.');return;}
    rwApplyDateRange();
  }

  // ── Shared render: dipanggil baik dari week selector maupun date range manual ──
  function rwRenderResult(wArr,periodLabel){
    ['rwDaily','rwWeekly'].forEach(id=>{if(charts[id]){try{charts[id].destroy();}catch(e){}}});
    Object.keys(charts).filter(k=>k.startsWith('rw')).forEach(k=>{try{charts[k].destroy();}catch(e){}delete charts[k];});
    const allRows=wArr.flatMap(w=>w.rows);
    const ts={sl:0,minor:0,medium:0,mayor:0};
    wArr.forEach(w=>{ts.sl+=w.sum.sl;ts.minor+=w.sum.minor;ts.medium+=w.sum.medium;ts.mayor+=w.sum.mayor;});
    const tot=ts.sl+ts.minor+ts.medium+ts.mayor;
    periodLabel=periodLabel||((activeBulan!=='all'?activeBulan+' '+activeYear:String(activeYear))+' — '+selectedWeeks.map(w=>'Week '+w).join(', '));

    // Daily chart data
    // Daily Finding — hanya dari week terakhir
    const lastWeek=wArr[wArr.length-1];
    const lastWeekRows=lastWeek?lastWeek.rows:allRows;
    const byDate={};
    lastWeekRows.forEach(r=>{const dl=serialToStr(r.s);if(!byDate[dl])byDate[dl]={sl:0,minor:0,medium:0,mayor:0,s:r.s};const t=errType(r.err);if(t)byDate[dl][t]++;});
    const dKeys=Object.keys(byDate).sort((a,b)=>byDate[a].s-byDate[b].s);

    // Highlights & improvement mengacu pada week terakhir (konsisten dengan Detail Record)
    const lastWArr=[lastWeek||wArr[wArr.length-1]];

      if(chunkEnd>dateTo) chunkEnd.setTime(dateTo.getTime());
      const fs2=dateToSerial(chunkStart.toISOString().slice(0,10));
      const ts2=dateToSerial(chunkEnd.toISOString().slice(0,10));
      const startStr=chunkStart.toLocaleDateString('id-ID',{day:'numeric',month:'short'});

      const rows=DB.auditLog.filter(r=>errType(r.err)&&r.s>=fs2&&r.s<=ts2);
      wArr.push({
        label:'Week '+chunkIdx+' ('+chunkStart.getDate()+'–'+chunkEnd.getDate()+')',

        rows,
        sum:summaryOf(rows),
        color:WEEK_COLORS[(chunkIdx-1)%WEEK_COLORS.length],
        dateRange:startStr+' s/d '+endStr
      });
      cur.setDate(cur.getDate()+7);
      chunkIdx++;
    }

    if(!wArr.some(w=>w.rows.length)){
      document.getElementById('rw-result').innerHTML=emptyState('Tidak ada data error untuk rentang tanggal ini.');return;
    }

    const fromStr=dateFrom.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
    const toStr=dateTo.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
    const periodLabel=fromStr+' s/d '+toStr+' ('+wArr.length+' minggu)';
    rwRenderResult(wArr,periodLabel);
  };
  window.rwResetDateRange=()=>{
    document.getElementById('rw-date-from').value='';
    document.getElementById('rw-date-to').value='';
    document.getElementById('rw-result').innerHTML='';
    Object.keys(charts).filter(k=>k.startsWith('rw')).forEach(k=>{try{charts[k].destroy();}catch(e){}delete charts[k];});
  };
}

// ===== REPORT MONTHLY =====
function renderReportMonthly(){
  const years=allYears();
  let activeYear=years[years.length-1]||2026;
  let selectedBulans=[];

  // Warna per bulan (max 3) — mirip screenshot: ungu, biru muda, cyan
  // Warna per bulan — distinct, tidak overlap dengan warna tipe error (abu/biru/orange/merah)
  const BULAN_COLORS=['#7C3AED','#F59E0B','#10B981']; // ungu, amber, hijau emerald
  const BULAN_COLORS_DIM=['rgba(124,58,237,0.15)','rgba(245,158,11,0.15)','rgba(16,185,129,0.15)'];

  // ── Data helpers ──────────────────────────────────────────────
  function getMonthRows(bulan,yr){
    return DB.auditLog.filter(r=>{
      if(!errType(r.err))return false;
      const d=serialToDate(r.s);
      return d&&BULAN_ORDER[d.getMonth()]===bulan&&d.getFullYear()===yr;
    });
  }

  // Group deskripsi per tipe error per bulan
  // TOP 5 diambil dari bulan TERAKHIR yang dipilih sebagai acuan
  // Bulan sebelumnya mengikuti deskripsi yang sama dari bulan terakhir
  function deskByType(type,bulanArr,yr){
    // ── Top 5 deskripsi: SEMUA dari bulan terakhir dulu, baru tambah dari bulan sebelumnya ──
    // Logika: bulan terakhir = acuan utama (semua deskripsinya masuk)
    //         bulan sebelumnya = pelengkap sampai 5 slot
    const lastBulan=bulanArr[bulanArr.length-1];
    const lastRows=getMonthRows(lastBulan,yr).filter(r=>errType(r.err)===type);
    const lastCnt={};
    lastRows.forEach(r=>{lastCnt[r.desk]=(lastCnt[r.desk]||0)+1;});
    // Semua deskripsi dari bulan terakhir masuk (sorted by count, max 5)
    const desksSet=new Set(
      Object.entries(lastCnt).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([d])=>d)
    );

    // Kalau slot masih ada (<5), tambah dari bulan sebelumnya (dari yang paling dekat)
    const prevBulans=[...bulanArr].slice(0,-1).reverse();
    for(const b of prevBulans){
      if(desksSet.size>=5) break;
      const rows=getMonthRows(b,yr).filter(r=>errType(r.err)===type);
      const cnt={};
      rows.forEach(r=>{cnt[r.desk]=(cnt[r.desk]||0)+1;});
      Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([d])=>{
        if(desksSet.size<5&&!desksSet.has(d)) desksSet.add(d);
      });
    }
    const desks=[...desksSet];

    if(!desks.length) return{desks:[],datasets:[]};

    // Untuk setiap bulan, cocokkan data berdasarkan deskripsi di atas
    const datasets=bulanArr.map((b,i)=>{
      const rows=getMonthRows(b,yr).filter(r=>errType(r.err)===type);
      const cnt={};rows.forEach(r=>{cnt[r.desk]=(cnt[r.desk]||0)+1;});
      return{
        label:b,
        data:desks.map(d=>cnt[d]||0),
        backgroundColor:BULAN_COLORS[i],
        borderRadius:4,
        borderSkipped:false
      };
    });

    return{desks,datasets};
  }

  // ── Highlight & Improvement per tipe ─────────────────────────
  function genTypeHighlight(type,bulanArr,yr){
    const typeLabel={sl:'Super Low',minor:'Minor',medium:'Medium',mayor:'Mayor'}[type];

    // Konsisten dengan grafik: semua dari bulan terakhir, tambah dari sebelumnya s/d 5
    const lastBulan2=bulanArr[bulanArr.length-1];
    const lastRows2=getMonthRows(lastBulan2,yr).filter(r=>errType(r.err)===type);
    const lastCnt2={};
    lastRows2.forEach(r=>{lastCnt2[r.desk]=(lastCnt2[r.desk]||0)+1;});
    const desksSet2=new Set(
      Object.entries(lastCnt2).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([d])=>d)
    );
    const prevBulans2=[...bulanArr].slice(0,-1).reverse();
    for(const b of prevBulans2){
      if(desksSet2.size>=5) break;
      const rows=getMonthRows(b,yr).filter(r=>errType(r.err)===type);
      const cnt={};rows.forEach(r=>{cnt[r.desk]=(cnt[r.desk]||0)+1;});
      Object.entries(cnt).sort((a,b)=>b[1]-a[1]).forEach(([d])=>{
        if(desksSet2.size<5&&!desksSet2.has(d)) desksSet2.add(d);
      });
    }
    const allDesks=[...desksSet2];
    if(!allDesks.length) return[`Tidak ditemukan error ${typeLabel} pada periode yang dipilih.`];

    // Hitung count & trend per deskripsi
    const items=allDesks.map(desk=>{
      const counts=bulanArr.map(b=>getMonthRows(b,yr).filter(r=>errType(r.err)===type&&r.desk===desk).length);
      const first=counts[0],last=counts[counts.length-1];
      const trend=last<first?'down':last>first?'up':'flat';
      return{desk,counts,last,trend};
    });

    // Maksimal 3 highlight: prioritaskan tren naik, lalu count tertinggi di bulan terakhir
    const sorted=[...items].sort((a,b)=>{
      if(a.trend==='up'&&b.trend!=='up')return -1;
      if(b.trend==='up'&&a.trend!=='up')return 1;
      return b.last-a.last;
    }).slice(0,3);

    const lines=sorted.map(({desk,counts,last,trend})=>{
      if(bulanArr.length===1){
        return `"${desk}": ${counts[0]} temuan di ${bulanArr[0]}.`;
      }
      const arrow=trend==='down'?'↓ menurun':trend==='up'?'↑ meningkat':'→ stabil';
      const countStr=bulanArr.map((b,i)=>`${b}: ${counts[i]}`).join(', ');
      return `"${desk}" ${arrow} (${countStr}).`;
    });
    return lines;
  }

  function genTypeImprovement(type,bulanArr,yr){
    const typeLabel={sl:'Super Low',minor:'Minor',medium:'Medium',mayor:'Mayor'}[type];
    // Improvement hanya dari bulan terakhir sebagai acuan terkini
    const lastBulan=bulanArr[bulanArr.length-1];
    const allRows=getMonthRows(lastBulan,yr).filter(r=>errType(r.err)===type);
    if(!allRows.length) return[`Tidak ada temuan ${typeLabel} di ${lastBulan} — pertahankan performa ini.`];
    const deskCnt={};allRows.forEach(r=>{deskCnt[r.desk]=(deskCnt[r.desk]||0)+1;});
    const topDesks=Object.entries(deskCnt).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const imp=[];
    if(type==='mayor') imp.push('Lakukan coaching intensif dan monitoring ketat untuk agent yang memiliki temuan Mayor — pastikan SOP penanganan chat dan informasi konfidensial dipahami dengan baik.');
    if(type==='medium') imp.push('Perkuat pemahaman SOP KYC dan prosedur pemberian solusi kepada member untuk mengurangi temuan Medium.');
    if(type==='minor'||type==='sl'){
      const tagging=allRows.filter(r=>r.desk.toLowerCase().includes('tagging')).length;
      if(tagging>=2) imp.push(`Adakan sesi refreshment materi tagging — ditemukan ${tagging} temuan terkait kesalahan tagging.`);
      imp.push('Baca dan pahami terlebih dulu setiap pertanyaan member, pastikan informasi yang diberikan sudah mencakup menyeluruh serta kurangi kesalahan pengetikan dalam menyampaikan informasi, product, dan fitur.');
    }
    if(topDesks[0]&&topDesks[0][1]>=2) imp.push(`Fokus perbaikan pada: "${topDesks[0][0]}" yang muncul ${topDesks[0][1]}x sebagai prioritas utama.`);
    return imp;
  }

      selectedBulans=selectedBulans.filter(x=>x!==b);
    }
    BULAN_ORDER.forEach((bx,i)=>{
      const l=document.getElementById('rmlbl-'+i);if(!l)return;
      const si=selectedBulans.indexOf(bx);
      if(si>=0){
        l.style.background=BULAN_COLORS[si];l.style.color='#fff';l.style.borderColor=BULAN_COLORS[si];
      } else {
        l.style.background='var(--white)';l.style.color='var(--gray-700)';l.style.borderColor='var(--gray-200)';
      }
    });
  };
  window.rmSetYear=(y)=>{
    activeYear=parseInt(y);selectedBulans=[];
    document.getElementById('rm-result').innerHTML='';
    BULAN_ORDER.forEach((_,i)=>{
      const l=document.getElementById('rmlbl-'+i);if(l){l.style.background='var(--white)';l.style.color='var(--gray-700)';l.style.borderColor='var(--gray-200)';}
      const cb=document.querySelector(`#rm-bulan-checks input[value="${BULAN_ORDER[i]}"]`);if(cb)cb.checked=false;
    });
  };
}

// ===== TOOLS =====
function renderTools(){
  // Hanya QC2026 dan LEAD yang bisa akses
  if(!currentUser||!currentUser.canImport){
    document.getElementById('main-content').innerHTML=`
      <div class="page-header"><div><h2>Tools</h2></div></div>
      <div class="content">${emptyState('Akses Ditolak','Anda tidak memiliki izin untuk menggunakan fitur Tools.')}</div>`;
    return;
  }

  const AGENT_MAP = {
    'AA':'Alvian','MZ':'Moza','RF':'Fadilah','RA':'Afrianzie','TS':'Tasya'
  };
  const BULAN_ID = ['Januari','Februari','Maret','April','Mei','Juni',
    'Juli','Agustus','September','Oktober','November','Desember'];

  // Tag dikirim full (crypto-inq-*, uss-*, perps-*) — matching dilakukan di Apps Script
  function normalizeTag(tag){ return tag ? tag.trim() : tag; }

  // Tentukan section dari prefix tag — support semua produk (crypto/uss/perps)
  function getSection(tag){
    if(!tag)return null;
    const t=tag.toLowerCase().trim();
    if(t.includes('-comp-')||t.startsWith('comp-'))return'Complain';
    if(t.startsWith('servreq-'))return'Service Request';
    if(t.includes('-inq-')||t.startsWith('inq-')||t.includes('-oth-')||
       t.startsWith('oth-')||t.startsWith('apu-'))return'Inquiry';
    return null;
  }

  function secsToMMSS(secs){
    if(!secs||secs<=0)return'';
    const total=Math.round(secs);
    const hh=Math.floor(total/3600);
    const mm=Math.floor((total%3600)/60);
    const ss=total%60;
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  }

  // Parse CSV
  function parseCSV(text){
    const rows=[];
    const lines=text.split('\n');
    let headers=[];
    lines.forEach((line,i)=>{
      if(!line.trim())return;
      // Simple CSV parse (handle quoted fields)
      const fields=[];let cur='';let inQ=false;
      for(let c=0;c<line.length;c++){
        if(line[c]==='"'){inQ=!inQ;}
        else if(line[c]===','&&!inQ){fields.push(cur.trim());cur='';}
        else{cur+=line[c];}
      }
      fields.push(cur.trim());
      if(i===0){headers=fields;}
      else{const obj={};headers.forEach((h,idx)=>{obj[h]=fields[idx]||'';});rows.push(obj);}
    });
    return rows;
  }

  // Process rows → aggregate per agent/tanggal/tag
  function processRows(rows){
    // Structure: { agentCode: { bulan: str, tahun: num, tags: { tag: { tanggal: { sum, count } } } } }
    const agg={};
    const unknownTags=new Set(); // tag yang tidak dikenali section-nya
    rows.forEach(r=>{
      const tag1=(r['tag 1']||'').trim().toUpperCase();
      if(!AGENT_MAP[tag1])return; // skip AI dan tidak dikenal
      const dateStr=r['chat creation date Asia/Jakarta']||r['chat creation date']||'';
      if(!dateStr)return;
      const dParts=dateStr.split(' ')[0].split('-'); // YYYY-MM-DD
      if(dParts.length<3)return;
      const yr=parseInt(dParts[0]);
      const mo=parseInt(dParts[1])-1;
      const day=parseInt(dParts[2]);
      const bulan=BULAN_ID[mo];
      const durSecs=parseFloat(r['chat duration in seconds'])||0;
      if(durSecs<=0)return;

      if(!agg[tag1])agg[tag1]={bulan,tahun:yr,tags:{}};

      // Proses tag 2 sampai 5 — normalisasi prefix crypto- dulu
      ['tag 2','tag 3','tag 4','tag 5'].forEach(tk=>{
        const rawTag=(r[tk]||'').trim();
        if(!rawTag)return;
        const tagVal=normalizeTag(rawTag); // strip crypto- prefix
        const section=getSection(tagVal);
        if(!section){unknownTags.add(rawTag);return;}
        if(!agg[tag1].tags[tagVal])agg[tag1].tags[tagVal]={};
        if(!agg[tag1].tags[tagVal][day])agg[tag1].tags[tagVal][day]={sum:0,count:0};
        agg[tag1].tags[tagVal][day].sum+=durSecs;
        agg[tag1].tags[tagVal][day].count+=1;
      });
    });

    // Flatten ke format payload
    const result=[];
    Object.entries(agg).forEach(([agentCode,agentData])=>{
      const items=[];
      Object.entries(agentData.tags).forEach(([tag,days])=>{
        Object.entries(days).forEach(([day,{sum,count}])=>{
          items.push({tag,tanggal:parseInt(day),avgSecs:sum/count,mmss:secsToMMSS(sum/count)});
        });
      });
      if(items.length>0){
        result.push({agentCode,bulan:agentData.bulan,tahun:agentData.tahun,data:items});
      }
    });
    return {result, unknownTags:[...unknownTags].sort()};
  }

  // Render halaman
  document.getElementById('main-content').innerHTML=`
    <div class="page-header">
      <div><h2>Tools</h2><p>Upload CSV Chat Report → otomatis masuk ke Google Sheets</p></div>
    </div>
    <div class="content">

      <div class="chart-card" style="margin-bottom:16px">
        <div class="chart-card-header"><h3>📤 Chat Duration Upload</h3></div>
        <p style="font-size:13px;color:var(--gray-600);margin-bottom:16px;line-height:1.6">
          Upload file CSV dari LiveChat (format: <code style="background:var(--gray-100);padding:2px 6px;border-radius:4px;font-size:12px">chats_report_*.csv</code>).<br>
          Dashboard akan memproses dan mengirim rata-rata durasi per tag per tanggal ke Google Sheets.
        </p>

        <div style="border:2px dashed var(--gray-300);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;transition:all .15s;background:var(--gray-50)"
             id="drop-zone"
             ondragover="event.preventDefault();this.style.borderColor='var(--accent)';this.style.background='var(--gray-100)'"
             ondragleave="this.style.borderColor='var(--gray-300)';this.style.background='var(--gray-50)'"
             ondrop="handleDrop(event)"
             onclick="document.getElementById('csv-input').click()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="1.5" style="margin-bottom:10px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div style="font-size:14px;font-weight:500;color:var(--gray-700);margin-bottom:4px">Drag & drop file CSV di sini</div>
          <div style="font-size:12px;color:var(--gray-400)">atau klik untuk browse file</div>
        </div>
        <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCSVUpload(event)">

        <div id="tool-status" style="display:none;margin-top:16px"></div>
      </div>

      <div id="tool-preview" style="display:none">
        <div class="chart-card" style="margin-bottom:14px">
          <div class="chart-card-header">
            <h3>Preview Data yang akan dikirim ke GSheet</h3>
            <div style="display:flex;gap:8px">
              <button onclick="sendToGSheet()" id="btn-send-gsheet"
                style="padding:8px 18px;background:#0e7490;color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Kirim ke GSheet
              </button>
              <button onclick="resetTool()"
                style="padding:8px 14px;background:transparent;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--gray-600)">
                Reset
              </button>
            </div>
          </div>
          <div id="preview-content"></div>
        </div>
      </div>

    </div>`;

  let processedData=[];

  window.handleDrop=(e)=>{
    e.preventDefault();
    document.getElementById('drop-zone').style.borderColor='var(--gray-300)';
    document.getElementById('drop-zone').style.background='var(--gray-50)';
    const file=e.dataTransfer.files[0];
    if(file)readCSVFile(file);
  };

  window.handleCSVUpload=(e)=>{
    const file=e.target.files[0];
    if(file)readCSVFile(file);
    e.target.value='';
  };

  function readCSVFile(file){
    if(!file.name.endsWith('.csv')){showToast('Hanya file CSV yang didukung.');return;}
    showToolStatus('loading','Membaca file '+file.name+'...');
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const rows=parseCSV(e.target.result);
        const validRows=rows.filter(r=>r['tag 1']&&AGENT_MAP[r['tag 1'].trim().toUpperCase()]);
        showToolStatus('info',`Total ${rows.length} baris dibaca, ${validRows.length} baris valid (agent dikenali).`);
        const {result,unknownTags}=processRows(rows);
        processedData=result;
        renderPreview(processedData,file.name,unknownTags);
      }catch(err){
        showToolStatus('error','Gagal memproses file: '+err.message);
      }
    };
    reader.readAsText(file);
  }

  function renderPreview(data,fname,unknownTags=[]){
    if(!data.length){
      showToolStatus('error','Tidak ada data valid yang bisa dikirim ke GSheet.');
      return;
    }

    // Summary per agent
    let html='';

    // Warning: tag tidak dikenali (tidak ada di mapping section GSheet)
    if(unknownTags.length>0){
      html+=`
        <div style="background:#fef9c3;border:1px solid #fde047;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;color:#854d0e;margin-bottom:8px">⚠️ ${unknownTags.length} Tag Tidak Ditemukan di GSheet</div>
          <div style="font-size:12px;color:#713f12;line-height:1.8">
            Tag berikut tidak cocok dengan section manapun (Inquiry/Complain/Service Request) dan tidak akan dikirim:
          </div>
          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
            ${unknownTags.map(t=>`<span style="font-family:'DM Mono',monospace;font-size:11px;background:#fef08a;padding:2px 8px;border-radius:3px;color:#713f12">${t}</span>`).join('')}
          </div>
        </div>`;
    }

    data.forEach(agentData=>{
      const agentName=AGENT_MAP[agentData.agentCode]||agentData.agentCode;
      const sheetTarget=`${agentData.bulan} ${agentData.tahun} - ${agentName}`;
      const byTag={};
      agentData.data.forEach(item=>{
        if(!byTag[item.tag])byTag[item.tag]=[];
        byTag[item.tag].push(item);
      });
      const tags=Object.keys(byTag).sort();

      html+=`
        <div style="margin-bottom:20px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:13px;font-weight:600;color:var(--gray-800)">
              ${agentName} <span style="font-weight:400;color:var(--gray-400)">→ Sheet: ${sheetTarget}</span>
            </div>
            <span style="font-size:11px;color:var(--gray-400)">${agentData.data.length} entri</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Tag</th><th>Section</th><th>Tanggal</th><th>Avg Duration</th><th>Detik</th></tr></thead>
              <tbody>
                ${agentData.data.slice(0,20).map(item=>`
                  <tr>
                    <td style="font-size:11px;font-family:'DM Mono',monospace">${item.tag}</td>
                    <td><span style="font-size:10px;padding:2px 6px;border-radius:3px;background:var(--gray-100);color:var(--gray-600)">${getSection(item.tag)||'?'}</span></td>
                    <td style="text-align:center">${item.tanggal}</td>
                    <td style="font-family:'DM Mono',monospace;font-weight:600;color:#0e7490">${item.mmss}</td>
                    <td style="font-size:11px;color:var(--gray-400)">${item.avgSecs.toFixed(1)}s</td>
                  </tr>`).join('')}
                ${agentData.data.length>20?`<tr><td colspan="5" style="text-align:center;color:var(--gray-400);font-size:12px">... dan ${agentData.data.length-20} entri lainnya</td></tr>`:''}
              </tbody>
            </table>
          </div>
        </div>`;
    });

    document.getElementById('preview-content').innerHTML=html;
    document.getElementById('tool-preview').style.display='block';
    showToolStatus('success',`Siap kirim: ${data.length} agent, ${data.reduce((s,d)=>s+d.data.length,0)} total entri ke GSheet.`);
  }

  window.sendToGSheet=async()=>{
    if(!processedData.length){showToast('Tidak ada data untuk dikirim.');return;}
    if(!CHAT_DURATION_URL||!APPS_SCRIPT_TOKEN){
      showToast('CHAT_DURATION_URL atau TOKEN belum dikonfigurasi di dashboard.');return;
    }

    const btn=document.getElementById('btn-send-gsheet');
    btn.disabled=true;
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Mengirim...';
    showToolStatus('loading',`Mengirim data ${processedData.length} agent ke Google Sheets...`);

    let totalWritten=0,totalSkipped=0,errors=[],details=[];

    for(const agentData of processedData){
      const agentName={'AA':'Alvian','MZ':'Moza','RF':'Fadilah','RA':'Afrianzie','TS':'Tasya'}[agentData.agentCode]||agentData.agentCode;
      showToolStatus('loading',`Mengirim data ${agentName} (${agentData.data.length} entri)...`);
      try{
        const payload={
          bulan:agentData.bulan,
          tahun:agentData.tahun,
          agentCode:agentData.agentCode,
          data:agentData.data
        };
        // Apps Script POST — URLSearchParams agar e.parameter.payload terbaca
        const url=`${CHAT_DURATION_URL}?token=${encodeURIComponent(APPS_SCRIPT_TOKEN)}`;
        const body=new URLSearchParams();
        body.append('payload',JSON.stringify(payload));
        const res=await fetch(url,{method:'POST',body,redirect:'follow'});
        if(!res.ok) throw new Error('HTTP '+res.status);
        const rawText=await res.text();
        let json;
        try{json=JSON.parse(rawText);}catch(e){throw new Error('Bukan JSON: '+rawText.slice(0,120));}
        if(json.error){
          errors.push(`${agentName}: ${json.error}`);
        } else {
          totalWritten+=json.written||0;
          totalSkipped+=json.skipped||0;
          details.push(`${agentName}: ${json.written} sel ditulis ke "${json.sheetName}"`);
          if(json.skipped>0){
            details.push(`  ↳ ${json.skipped} entri dilewati`);
            if(json.skippedDetails&&json.skippedDetails.length){
              json.skippedDetails.forEach(s=>{
                details.push(`&nbsp;&nbsp;&nbsp;&nbsp;• <code style="font-size:11px">${s.tag}</code> tgl ${s.tanggal} — <span style="color:#b45309">${s.reason}</span>`);
              });
            }
          }
        }
      }catch(err){
        errors.push(`${agentName}: ${err.message}`);
      }
    }

    btn.disabled=false;
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Kirim ke GSheet';

    if(errors.length&&totalWritten===0){
      showToolStatus('error','Gagal mengirim: '+errors.join(' | '));
    } else if(errors.length&&totalWritten>0){
      showToolStatus('info',`Sebagian berhasil — ${totalWritten} sel ditulis. Error: ${errors.join(' | ')}`);
    } else {
      const detailStr=details.join('<br>');
      showToolStatus('success',`✓ Berhasil! ${totalWritten} sel ditulis ke GSheet.${totalSkipped>0?' ('+totalSkipped+' entri dilewati)':''}${detailStr?'<br><small style=\"opacity:.7\">'+detailStr+'</small>':''}`);
    }
  };

  window.resetTool=()=>{
    processedData=[];
    document.getElementById('tool-preview').style.display='none';
    document.getElementById('tool-status').style.display='none';
    document.getElementById('csv-input').value='';
  };

  function showToolStatus(type,msg){
    const el=document.getElementById('tool-status');
    const styles={
      loading:{bg:'var(--gray-100)',color:'var(--gray-700)',icon:'⟳'},
      info:{bg:'#eff6ff',color:'#1d4ed8',icon:'ℹ'},
      success:{bg:'#f0fdf4',color:'#15803d',icon:'✓'},
      error:{bg:'#fef2f2',color:'#b91c1c',icon:'⚠'}
    };
    const s=styles[type]||styles.info;
    el.style.display='block';
    el.innerHTML=`<div style="padding:12px 16px;background:${s.bg};border-radius:var(--radius);font-size:13px;color:${s.color};display:flex;align-items:center;gap:8px">
      <span>${s.icon}</span><span>${msg}</span></div>`;
  }
}

function presGoTo(idx){
  // Determine which dataset to use — weekly or monthly
  const isWeekly=window._presIsWeekly;

  if(isWeekly){
    // Weekly mode — simple slide list
    const slides=window._presWeeklySlides||[];
    if(idx<0||idx>=slides.length)return;
    document.querySelectorAll('.pres-slide').forEach(el=>el.classList.remove('active'));
    const slideEl=document.getElementById('pslide-'+idx);
    if(slideEl)slideEl.classList.add('active');
    document.querySelectorAll('.pres-progress-dot').forEach((el,i)=>el.classList.toggle('done',i<=idx));
    document.getElementById('pres-counter').textContent=`${idx+1} / ${slides.length}`;
    document.getElementById('pres-prev').disabled=(idx===0);
    document.getElementById('pres-next').disabled=(idx===slides.length-1);
    const canvasId='pres-chart-'+idx;
    if(!presCharts[canvasId]){
      const s=slides[idx];
      // Skip chart rendering for detail slides
      if(!s.isDetailSlide){
        setTimeout(()=>{if(s.chartFn)s.chartFn(canvasId);},60);
      }
    }
    presCurrentSlide=idx;
    return;
  }

  // Monthly mode
  const data=window._presData;
  const slides=data.slides;
  const totalLen=slides.length+1;
  if(idx<0||idx>=totalLen)return;

  // Hide all slides
  document.querySelectorAll('.pres-slide').forEach(el=>el.classList.remove('active'));
  // Show target
  const slideEl=document.getElementById('pslide-'+idx);
  if(slideEl)slideEl.classList.add('active');

  // Update progress dots
  document.querySelectorAll('.pres-progress-dot').forEach((el,i)=>{
    el.classList.toggle('done',i<=idx);
  });

  // Update counter
  document.getElementById('pres-counter').textContent=`${idx+1} / ${totalLen}`;

  // Update nav buttons
  document.getElementById('pres-prev').disabled=(idx===0);
  document.getElementById('pres-next').disabled=(idx===totalLen-1);

  // Render chart for this slide if not yet rendered
  if(idx===0){
    // Overview slide — render 3 charts
    if(!presCharts['pres-ov-find']){
      setTimeout(()=>{
        const ms=data.presMonthSums;
        const gs=data.presGrandSum;
        const darkGrid='rgba(0,0,0,0.06)';
        const tickColor='#64748b';
        // Finding bar+line
        const cvF=document.getElementById('pres-ov-find');
        if(cvF) presCharts['pres-ov-find']=new Chart(cvF,{
          type:'bar',plugins:[ChartDataLabels],
          data:{labels:data.bArr,datasets:[
            {data:ms.map(m=>m.tot),backgroundColor:data.BULAN_COLORS,borderRadius:6,borderSkipped:false,type:'bar',datalabels:{anchor:'end',align:'end',font:{size:12,weight:'bold'},color:'#1e293b',formatter:v=>v}},
            {data:ms.map(m=>m.tot),type:'line',borderColor:'#94a3b8',borderWidth:1.5,pointRadius:3,fill:false,tension:.3,datalabels:{display:false}}
          ]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.type==='line'?null:ctx.formattedValue}}},
            scales:{x:{grid:{display:false},ticks:{color:tickColor,font:{size:12}}},y:{grid:{color:darkGrid},beginAtZero:true,ticks:{color:tickColor,stepSize:1}}}}
        });
        // Points bar+line
        const cvP=document.getElementById('pres-ov-pts');
        if(cvP) presCharts['pres-ov-pts']=new Chart(cvP,{
          type:'bar',plugins:[ChartDataLabels],
          data:{labels:data.bArr,datasets:[
            {data:ms.map(m=>m.pts),backgroundColor:data.BULAN_COLORS,borderRadius:6,borderSkipped:false,type:'bar',datalabels:{anchor:'end',align:'end',font:{size:12,weight:'bold'},color:'#1e293b',formatter:v=>v}},
            {data:ms.map(m=>m.pts),type:'line',borderColor:'#f87171',borderWidth:1.5,pointRadius:3,fill:false,tension:.3,datalabels:{display:false}}
          ]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.type==='line'?null:ctx.formattedValue}}},
            scales:{x:{grid:{display:false},ticks:{color:tickColor,font:{size:12}}},y:{grid:{color:darkGrid},beginAtZero:true,ticks:{color:tickColor,stepSize:1}}}}
        });
        // Donut
        const cvD=document.getElementById('pres-ov-pie');
        if(cvD) presCharts['pres-ov-pie']=new Chart(cvD,{
          type:'doughnut',
          data:{labels:['Super Low','Minor','Medium','Mayor'],
            datasets:[{data:[gs.sl,gs.minor,gs.medium,gs.mayor],
              backgroundColor:['#94a3b8','#3b82f6','#f97316','#ef4444'],
              borderWidth:0,hoverOffset:6}]},
          options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
            plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:12},padding:14}},
              datalabels:{display:false},
              tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw}`}}}}
        });
      },60);
    }
    return;
  }

  // Error type slides (idx 1+)
  const canvasId='pres-chart-'+idx;
  if(!presCharts[canvasId]){
    const s=slides[idx-1]; // -1 karena slides[] tidak include overview
    setTimeout(()=>{
      const canvas=document.getElementById(canvasId);
      if(!canvas)return;
      presCharts[canvasId]=new Chart(canvas,{
        type:'bar',
        data:{labels:s.desks,datasets:s.datasets},
        plugins:[ChartDataLabels],
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{
              title:(items)=>items[0].label,
              afterBody:(items)=>{
                const totals=s.datasets.map((ds,i)=>`${ds.label}: ${ds.data[items[0].dataIndex]}`);
                return['',...totals];
              }
            }},
            datalabels:{
              anchor:'end',
              align:'end',
              formatter:(v)=>v===0?'':v,
              font:{size:11,weight:'bold'},
              color:'#1e293b'
            }
          },
          scales:{
            x:{
              grid:{display:false},
              ticks:{color:'#64748b',font:{size:10,weight:'600'},autoSkip:false,maxRotation:0,minRotation:0,
                callback:function(value){
                  const label=this.getLabelForValue(value);
                  // Wrap label panjang menjadi multi-baris agar tidak di-skip Chart.js
                  const words=String(label).split(' ');
                  const lines=[];let cur='';
                  words.forEach(w=>{
                    if((cur+' '+w).trim().length>16){lines.push(cur.trim());cur=w;}
                    else cur=(cur+' '+w).trim();
                  });
                  if(cur)lines.push(cur);
                  return lines;
                }
              }
            },
            y:{
              grid:{color:'rgba(255,255,255,0.06)'},
              beginAtZero:true,
              ticks:{stepSize:1,font:{size:11},color:'#64748b'},
              title:{display:true,text:'Total Finding',font:{size:11},color:'#475569'}
            }
          }
        }
      });
    },60);
  }

  presCurrentSlide=idx;
}

function pptxHex(c){return String(c||'#0e7490').replace('#','');}

function pptxHeader(slide,title,subtitle,color){

// Perbesar canvas chart sementara (sesuai aspect ratio box tujuan di PPTX) agar
// saat di-capture, chart (bar, label, deskripsi) tampil besar & jelas — bukan
// mengecil akibat letterbox dari aspect ratio canvas asli yang sangat landscape.
function pptxGrowChart(chart,boxWIn,boxHIn,dpi){
  if(!chart)return null;
  const orig={w:chart.width,h:chart.height};
  try{ chart.resize(Math.round(boxWIn*dpi),Math.round(boxHIn*dpi)); }catch(e){}
  return orig;
}
function pptxShrinkChart(chart,orig){
  if(!chart)return;
  try{ if(orig) chart.resize(orig.w,orig.h); else chart.resize(); }catch(e){}
}

function pptxStripTags(t){return String(t==null?'':t).replace(/<[^>]+>/g,'');}

// Tempatkan gambar chart agar proporsional (object-fit: contain) di dalam box x,y,w,h
// Tanpa ini, sizing:{type:'contain'} pptxgenjs melakukan crop+stretch yang membuat
// chart dengan aspect ratio jauh berbeda (misal donut) tampak gepeng/oval.
function pptxAddChartImage(slide,chart,boxX,boxY,boxW,boxH){
  if(!chart||!chart.canvas)return;
  const boxRatio=boxW/boxH;
  let dataUrl=null;

  // Render ulang chart di canvas sementara dengan aspect ratio = box target,
  // sehingga gambar mengisi penuh box (besar & proporsional) tanpa distorsi.
  try{
    const baseW=1200, baseH=Math.round(baseW/boxRatio);
    const tmpCanvas=document.createElement('canvas');
    tmpCanvas.width=baseW; tmpCanvas.height=baseH;
    const tmpOptions=Object.assign({},chart.config.options,{
      responsive:false, maintainAspectRatio:false, animation:false,
      devicePixelRatio:1
    });
    const tmpChart=new Chart(tmpCanvas,{
      type:chart.config.type,
      data:chart.config.data,
      options:tmpOptions,
      plugins:chart.config.plugins
    });
    tmpChart.draw();
    dataUrl=tmpChart.toBase64Image('image/png',1);
    tmpChart.destroy();
  }catch(e){
    console.warn('pptxAddChartImage fallback:',e);
  }

  if(!dataUrl){
    // Fallback: pakai canvas asli, fit-contain agar tidak distorsi
    const cw=chart.canvas.width, ch=chart.canvas.height;
    if(!cw||!ch)return;
    const imgRatio=cw/ch;
    let w,h;
    if(imgRatio>boxRatio){w=boxW;h=boxW/imgRatio;}else{h=boxH;w=boxH*imgRatio;}
    const x=boxX+(boxW-w)/2, y=boxY+(boxH-h)/2;
    slide.addImage({data:chart.toBase64Image(),x,y,w,h});
    return;
  }

  // dataUrl sudah punya aspect ratio = boxRatio -> isi penuh box
  slide.addImage({data:dataUrl,x:boxX,y:boxY,w:boxW,h:boxH});
}

function pptxHighlightImprovementBoxes(slide,highlights,improvement,x,y,w,h){
  const gap=0.18;
  const halfH=(h-gap)/2;
  // Highlights box (biru tua)

async function downloadPresPPTX(type){
  if(window._pptxBusy)return;
  // Resolve PptxGenJS from any possible global name
  const PptxGen=window.PptxGenJS||window.PptxGen||window.pptxgen;
  if(typeof PptxGen==='undefined'){
    showToast('Library PPTX belum termuat. Coba refresh halaman terlebih dahulu.');
    return;
  }

  const isWeekly=(type==='weekly');
  if(isWeekly && !window._presWeeklyData){showToast('Tampilkan report terlebih dahulu.');return;}
  if(!isWeekly && (!window._presData||!window._presData.slides||!window._presData.slides.length)){showToast('Tampilkan report terlebih dahulu.');return;}

  window._pptxBusy=true;
  const overlay=document.getElementById('pres-overlay');
  const wasOpen=overlay.classList.contains('active');
  showToast('Membuat file PPTX, mohon tunggu...');

  try{
    if(isWeekly) openPresWeekly(); else openPresMode();
    window._presIsWeekly=isWeekly;

    await new Promise(r=>setTimeout(r,350));

    const totalSlides=isWeekly?(window._presWeeklySlides||[]).length:(window._presData.slides.length+1);
    const periodLabel=document.getElementById('pres-period').textContent||'';

    const pptx=new PptxGen();
    pptx.defineLayout({name:'QC_WIDE',width:13.333,height:7.5});
    pptx.layout='QC_WIDE';
    pptx.author='QC Dashboard';
    pptx.title=`QC Report ${isWeekly?'Weekly':'Monthly'} — ${periodLabel}`;

    for(let i=0;i<totalSlides;i++){
      presGoTo(i);
      await new Promise(r=>setTimeout(r,380));
      if(isWeekly) pptxBuildWeeklySlide(pptx,i); else pptxBuildMonthlySlide(pptx,i);
    }

    if(!wasOpen) closePres();

    const safePeriod=periodLabel.replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_+|_+$/g,'');
    const fname=`QC_Report_${isWeekly?'Weekly':'Monthly'}_${safePeriod||Date.now()}.pptx`;
    await pptx.writeFile({fileName:fname});
    showToast('PPTX berhasil didownload!');
  }catch(err){
    console.error(err);
    showToast('Gagal membuat PPTX: '+(err&&err.message?err.message:'unknown error'));
    if(!wasOpen) closePres();
  }finally{
    window._pptxBusy=false;
  }
}

function downloadReportCSV(type,yr){
  const allowed=['SQLEAD','QC2026','LEAD'];
  if(!currentUser||!allowed.includes(currentUser.username)){showToast('Anda tidak memiliki akses download report.');return;}
  const rows=logForYear(yr).filter(r=>errType(r.err)).sort((a,b)=>a.s-b.s);
  let csv=[['Tanggal','Agent','Chat ID','Kategori','Jenis Error','Poin','Deskripsi Error','Bulan','Tahun']];
  rows.forEach(r=>{const d=serialToDate(r.s);csv.push([serialToStr(r.s),r.agent,r.chatId,r.cat,errLabel(r.err),r.pt||0,r.desk,d?BULAN_ORDER[d.getMonth()]:'',d?d.getFullYear():'']);});
  const blob=new Blob(['\uFEFF'+csv.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`QC_Report_${type}_${yr}.csv`;a.click();

// ===== IMPORT =====
function triggerImport(ctx){
  if(!currentUser||!currentUser.canImport){showToast('Anda tidak memiliki akses import data.');return;}
  importContext=ctx;document.getElementById('file-import').click();
}

function handleImport(event){
  const file=event.target.files[0];if(!file)return;
  event.target.value='';const ctx=importContext;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      let rows=[],sheetName=file.name.replace(/\.[^.]+$/,'');
      if(ext==='csv'){
        const text=e.target.result;
        rows=text.split('\n').map(r=>r.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
      } else {
        const wb=XLSX.read(e.target.result,{type:'array'});
        sheetName=wb.SheetNames[0];
        const ws=wb.Sheets[sheetName];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      }
      pendingImportData={ctx,rows,sheetName,fname:file.name};
      showImportModal(ctx,rows,sheetName);
    }catch(err){showToast('Gagal membaca file: '+err.message);}
  };
  if(ext==='csv')reader.readAsText(file);else reader.readAsArrayBuffer(file);
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

function confirmImport(){
  if(!pendingImportData)return;
  const {ctx,rows,sheetName}=pendingImportData;
  const tahun=parseInt(document.getElementById('imp-year').value)||new Date().getFullYear();
  const bulanEl=document.getElementById('imp-bulan');
  const bulan=bulanEl?bulanEl.value:'';
  const weekEl=document.getElementById('imp-week');
  const weekNum=weekEl?parseInt(weekEl.value):null;
  closeModal();
  processImport(ctx,rows,sheetName,tahun,bulan,weekNum);
  pendingImportData=null;
}

function processImport(ctx,rows,sheetName,tahun,targetBulan,weekNum){
  if(!rows||rows.length<2){showToast('File kosong.');return;}
  const header=rows[0].map(h=>String(h||'').toLowerCase().trim());

  if(ctx==='kpi-weekly'||ctx==='kpi-monthly'){
    const nameIdx=header.findIndex(h=>h.includes('name')||h.includes('nama'));
    const kpiIdx=header.findIndex(h=>h.includes('kpi'));
    if(nameIdx<0||kpiIdx<0){showToast('Kolom "Name" dan "KPI" tidak ditemukan.');return;}
    const agents=rows.slice(1).filter(r=>r[nameIdx]).map(r=>({
      name:String(r[nameIdx]||''),punct:parseFloat(r[1])||10,respTime:parseFloat(r[2])||0,
      chatInq:parseFloat(r[3])||0,chatComp:parseFloat(r[4])||0,chatServ:parseFloat(r[5])||0,
      kyc:parseFloat(r[6])||10,satisf:parseFloat(r[7])||0,qaqc:parseFloat(r[8])||0,
      quiz:parseFloat(r[9])||0,kpi:parseFloat(r[kpiIdx])||0
    }));
    if(ctx==='kpi-weekly'){
      // Key = "sheetName — Bulan Tahun Week N"
      const key=`${sheetName} — ${targetBulan} ${tahun} (W${weekNum})`;
      DB.kpiWeekly[key]={period:`${sheetName}`,tahun,bulan:targetBulan,week:weekNum,agents};
      showToast(`KPI Weekly "${key}" berhasil diimport!`);renderKpiWeekly();
    } else {
      const key=`${targetBulan} ${tahun}`;
      DB.kpiMonthly[key]={tahun,bulan:targetBulan,agents};
      showToast(`KPI Monthly "${key}" berhasil diimport!`);renderKpiMonthly();
    }
    return;
  }

  // Audit log import
  const tglIdx=header.findIndex(h=>h.includes('tanggal')||h.includes('date'));
  const agentIdx=header.findIndex(h=>h.includes('agent'));
  const errIdx=header.findIndex(h=>h.includes('error')||h.includes('err')||h.includes('jenis'));
  const deskIdx=header.findIndex(h=>h.includes('desk')||h.includes('deskripsi'));
  let added=0,skipped=0;

  rows.slice(1).forEach(r=>{
    const agent=String(r[agentIdx>=0?agentIdx:1]||'').trim();
    const errVal=String(r[errIdx>=0?errIdx:4]||'').trim();
    const desk=String(r[deskIdx>=0?deskIdx:6]||'').trim();
    const chatId=String(r[2]||'').trim();
    const cat=String(r[3]||'').trim();
    const pt=parseFloat(r[5])||0;
    if(!agent||!errType(errVal))return;
    // Parse tanggal → serial
    let serial=0;
    const tglRaw=r[tglIdx>=0?tglIdx:0];
    if(tglRaw){
      const n=parseFloat(tglRaw);
      if(!isNaN(n)&&n>40000){serial=n;}
      else{const dp=new Date(tglRaw);if(!isNaN(dp))serial=Math.round((dp-(new Date(1899,11,30)))/86400000);}
    }
    // If no date parsed, use first day of targetBulan+tahun
    if(!serial){
      const mIdx=BULAN_ORDER.indexOf(targetBulan);
      const d=new Date(tahun,mIdx>=0?mIdx:0,1);
      serial=Math.round((d-(new Date(1899,11,30)))/86400000);
    }
    // Verify bulan from serial matches or use targetBulan
    const serDate=serialToDate(serial);
    const serBulan=serDate?BULAN_ORDER[serDate.getMonth()]:targetBulan;
    const serTahun=serDate?serDate.getFullYear():tahun;

    // Deduplicate by chatId + bulan + tahun
    if(chatId&&DB.auditLog.find(x=>x.chatId===chatId)){skipped++;return;}
    DB.auditLog.push({s:serial,agent,chatId,cat,err:errVal,pt,desk});
    added++;
  });

  showToast(`${added} record diimport${skipped?' ('+skipped+' duplikat dilewati)':''} — nama sheet: ${sheetName}`);
  if(ctx==='report-weekly')renderReportWeekly();
  else if(ctx==='report-monthly')renderReportMonthly();
  else renderAudit();
}
</script>
</body>
</html>
